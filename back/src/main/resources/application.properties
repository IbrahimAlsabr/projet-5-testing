spring.datasource.url=jdbc:mysql://localhost:3306/yoga?allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=NewStrongPassword123!

# Database initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:script.sql
spring.sql.init.data-locations=classpath:script.sql
spring.sql.init.continue-on-error=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

oc.app.jwtSecret=openclassrooms
oc.app.jwtExpirationMs=86400000
